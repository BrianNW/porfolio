name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      STATIC_EXPORT: "true"
      GITHUB_REPOSITORY: ${{ github.repository }}
      REPO_BASEPATH: /${{ github.event.repository.name }}
      PAGES_CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
      NEXT_PUBLIC_CONTACT_MODE: mailto
      NEXT_PUBLIC_CONTACT_TO_EMAIL: ${{ vars.CONTACT_TO_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Remove unsupported API route for static export
        run: rm -rf src/app/api

      - name: Build static export
        run: npm run build

      - name: Write CNAME for custom domain
        if: ${{ vars.PAGES_CUSTOM_DOMAIN != '' }}
        run: printf '%s\n' "$PAGES_CUSTOM_DOMAIN" > out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4